spring.application.name=hello-springboot

# \u6570\u636E\u6E90\u914D\u7F6E
spring.datasource.url=jdbc:mysql://localhost:3306/test?useSSL=false&serverTimezone=Asia/Tokyo&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# MyBatis Mapper \u6587\u4EF6\u8DEF\u5F84
mybatis.mapper-locations=classpath:mapper/*.xml
# \u66B4\u9732 beans \u7AEF\u70B9\uFF08\u9ED8\u8BA4\u53EA\u66B4\u9732 health \u548C info\uFF09
# \u5141\u8BB8 web \u8BBF\u95EE beans \u7AEF\u70B9
management.endpoints.web.exposure.include=beans,health