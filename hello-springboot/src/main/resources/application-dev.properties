# \u6570\u636E\u5E93\u9A71\u52A8\u7C7B\u540D (21c/23ai \u63A8\u8350\u4F7F\u7528\u8FD9\u4E2A)
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# \u6570\u636E\u5E93\u8FDE\u63A5 URL
# \u683C\u5F0F: jdbc:oracle:thin:@[IP\u5730\u5740]:[\u7AEF\u53E3\u53F7]/[\u670D\u52A1\u540D]
# \u5982\u679C\u662F\u672C\u5730 23ai Free \u7248\uFF0C\u670D\u52A1\u540D\u901A\u5E38\u662F FREEPDB1
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/FREEPDB1

# \u6570\u636E\u5E93\u7528\u6237\u540D
spring.datasource.username=ROOT

# \u6570\u636E\u5E93\u5BC6\u7801
spring.datasource.password=ROOT
# --- MyBatis \u914D\u7F6E ---
# \u6307\u5B9A Mapper XML \u6587\u4EF6\u7684\u4F4D\u7F6E
mybatis.mapper-locations=classpath:mapper/*.xml
# \u6307\u5B9A Entity \u7C7B\u7684\u5305\u8DEF\u5F84\uFF0C\u8FD9\u6837 XML \u91CC\u5C31\u4E0D\u9700\u8981\u5199\u5168\u8DEF\u5F84\u7C7B\u540D
mybatis.type-aliases-package=Ansin.web.entity
# \u5F00\u542F\u9A7C\u5CF0\u547D\u540D\u81EA\u52A8\u8F6C\u6362 (\u5982\u6570\u636E\u5E93 USER_CD \u81EA\u52A8\u6620\u5C04\u5230 Java userCd)
mybatis.configuration.map-underscore-to-camel-case=true

# --- HikariCP \u8FDE\u63A5\u6C60\u4F18\u5316 ---
# \u6700\u5C0F\u7A7A\u95F2\u8FDE\u63A5\u6570
spring.datasource.hikari.minimum-idle=5
# \u6700\u5927\u8FDE\u63A5\u6C60\u5927\u5C0F
spring.datasource.hikari.maximum-pool-size=20
# \u8FDE\u63A5\u8D85\u65F6\u65F6\u95F4\uFF08\u6BEB\u79D2\uFF09
spring.datasource.hikari.connection-timeout=30000
# \u7A7A\u95F2\u8FDE\u63A5\u5B58\u6D3B\u65F6\u95F4
spring.datasource.hikari.idle-timeout=600000
logging.level.org.springframework.web=DEBUG
logging.level.com.fasterxml.jackson=DEBUG